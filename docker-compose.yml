version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: crm-ai-postgres
    environment:
      POSTGRES_USER: crm_admin
      POSTGRES_PASSWORD: admin_password
      POSTGRES_DB: crm_ai_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - crm-network

  redis:
    image: redis:7-alpine
    container_name: crm-ai-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - crm-network

networks:
  crm-network:
    driver: bridge

volumes:
  pgdata:
  redisdata: